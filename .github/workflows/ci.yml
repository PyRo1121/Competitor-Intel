name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync
      - name: CI (lint, tests, gates, daily dry-run)
        env:
          CI_DB_PATH: ${{ github.workspace }}/data/ci_test.db
        run: make ci
