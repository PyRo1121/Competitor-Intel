name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync
      - name: Lockfile check
        run: make lock-check
      - name: Python supply chain (pip-audit)
        run: make supply-chain-py
      - name: Compile
        run: make compile
      - name: Lint (Python)
        run: make lint-py
      - name: Init test database
        run: |
          export CI_DB_PATH="${{ github.workspace }}/data/ci_test.db"
          uv run python -c "from db.schema import init_database; init_database()"
      - name: Tests and coverage
        env:
          CI_DB_PATH: ${{ github.workspace }}/data/ci_test.db
        run: make test-cov
      - name: Intel quality gate
        env:
          CI_DB_PATH: ${{ github.workspace }}/data/ci_test.db
        run: make intel-gate
      - name: Golden classifier eval
        run: make golden-eval
      - name: Claims audit strict
        env:
          CI_DB_PATH: ${{ github.workspace }}/data/ci_test.db
        run: make claims-audit-strict
      - name: Daily pipeline dry-run
        env:
          CI_SKIP_GROK_X: "1"
        run: uv run python apps/worker/daily_intel.py --dry-run

  api:
    runs-on: ubuntu-latest
    needs: python
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install JS tooling
        run: bun install
      - name: Lint (TypeScript)
        run: make lint-js
      - name: Dashboard typecheck
        working-directory: apps/dashboard
        run: |
          bun install
          bun run check
      - name: Dashboard unit tests
        working-directory: apps/dashboard
        run: bun run test:unit
      - name: Init API database
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          export PATH="$HOME/.local/bin:$PATH"
          uv sync
          export CI_DB_PATH="${{ github.workspace }}/data/ci_test.db"
          uv run python -c "from db.schema import init_database; init_database()"
      - name: API smoke tests
        working-directory: apps/api
        env:
          CI_DB_PATH: ${{ github.workspace }}/data/ci_test.db
        run: bun test
      - name: JS supply chain (frozen lock + audit)
        run: make supply-chain-api supply-chain-dashboard
      - name: Install Playwright browser
        working-directory: apps/dashboard
        run: bunx playwright install chromium
      - name: Dashboard e2e smoke
        env:
          CI: "true"
          CI_DB_PATH: ${{ github.workspace }}/data/ci_test.db
        run: make dashboard-e2e
