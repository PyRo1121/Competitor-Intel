[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "competitor-intel"
version = "2.1.0"
description = "Competitive intelligence monorepo — collectors, API, dashboard, workers"
requires-python = ">=3.11"
readme = "README.md"
license = { text = "MIT" }
dependencies = [
    "sqlalchemy>=2.0.41",
    "alembic>=1.16.0",
    "httpx>=0.28.1",
    "beautifulsoup4>=4.13.4",
    "feedparser>=6.0.11",
    "pydantic>=2.11.0",
    "pydantic-settings>=2.9.0",
    "pyyaml>=6.0.2",
    "tenacity>=9.1.0",
    "jinja2>=3.1.6",
    "typer>=0.15.0",
    "rich>=14.0.0",
    "structlog>=25.4.0",
    "ollama>=0.4.0",
    "numpy>=2.2.0",
    "python-dotenv>=1.1.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.3.0",
    "pytest-asyncio>=0.26.0",
    "pytest-cov>=6.1.0",
    "ruff>=0.11.0",
    "mypy>=1.15.0",
    "pre-commit>=4.2.0",
    "factory-boy>=3.3.3",
    "respx>=0.22.0",
    "pip-audit>=2.9.0",
]

[project.scripts]
competitor-intel = "competitor_intel.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["packages/py-enterprise/src/competitor_intel"]

[tool.ruff]
target-version = "py311"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP", "B", "C4", "SIM", "ARG"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"

# Monorepo layout (not yet a uv workspace — install with PYTHONPATH or editable install):
#   packages/py-collectors   — operational collectors
#   packages/py-core         — db, utils, alerts, config
#   packages/py-enterprise   — SQLAlchemy package (src/competitor_intel)
#   apps/worker              — daily pipeline scripts
#   apps/cli                 — intel.py, run_intel.py
#   apps/api                 — Hono REST API (Bun)
#   apps/dashboard           — Svelte dashboard
