[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "competitor-intel"
version = "2.1.0"
description = "Enterprise SQLAlchemy package for Competitor Intel"
requires-python = ">=3.11"
dependencies = [
    "competitor-intel-core",
    "competitor-intel-collectors",
    "sqlalchemy>=2.0.41",
    "alembic>=1.16.0",
    "pydantic>=2.11.0",
    "pydantic-settings>=2.9.0",
    "jinja2>=3.1.6",
    "typer>=0.15.0",
    "rich>=14.0.0",
]

[project.scripts]
competitor-intel = "competitor_intel.cli:main"

[tool.uv.sources]
competitor-intel-core = { workspace = true }
competitor-intel-collectors = { workspace = true }

[tool.hatch.build.targets.wheel]
packages = ["src/competitor_intel"]
