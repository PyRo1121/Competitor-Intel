[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "competitor-intel-core"
version = "2.1.0"
description = "DB, utils, alerts, and shared config for Competitor Intel"
requires-python = ">=3.11"
dependencies = [
    "curl-cffi>=0.7.0",
    "httpx>=0.28.1",
    "pyyaml>=6.0.2",
    "structlog>=25.4.0",
    "python-dotenv>=1.1.0",
]

[tool.hatch.build.targets.wheel]
packages = ["db", "utils", "alerts", "ci_paths"]
